<div class="ag-page">
  <div class="bento-header">
    <div>
      <h2>Automações <span class="gradient-text">& Workflows</span></h2>
      <p>Defina gatilhos e ações automáticas. Suas regras de negócio na nuvem.</p>
    </div>
  </div>

  <!-- Elite Loader -->
  <div class="elite-loader-container" *ngIf="isLoading" style="min-height: 200px; background: var(--active-bg); border-radius: 20px; border: 1px solid var(--glass-border);">
    <div class="elite-scissor-wrap"></div>
    <div class="loader-text">Sincronizando Workflows...</div>
  </div>

  <div *ngIf="!isLoading">
    <!-- Rules List -->
    <div class="rules-grid">
      <div class="rule-card" *ngFor="let rule of rules" [class.inactive]="!rule.active">
        <div class="rule-card-top">
          <h3>{{ rule.name }}</h3>
          <div class="toggle-switch" (click)="toggleRule(rule.id)">
            <div class="toggle-pill" [class.on]="rule.active">
              <div class="knob"></div>
            </div>
          </div>
        </div>
        <div class="rule-flow">
          <span class="flow-badge trigger">
            <i class="pi pi-bolt"></i> {{ formatTrigger(rule.trigger) }}
          </span>
          <i class="pi pi-arrow-right flow-arrow"></i>
          <span class="flow-badge action">
            <i class="pi pi-play"></i> {{ formatAction(rule.action) }}
          </span>
        </div>
      </div>

      <div class="empty-state" *ngIf="rules.length === 0">
        <i class="pi pi-bolt"></i>
        <p>Nenhum workflow criado ainda. Adicione sua primeira automação abaixo.</p>
      </div>
    </div>

    <!-- New Rule Form -->
    <div class="new-rule-card">
      <h3><i class="pi pi-plus-circle"></i> Nova Automação</h3>
      <div class="new-rule-form">
        <input pInputText type="text" [(ngModel)]="newRuleName" placeholder="Nome da Automação (ex: Lembrete)" style="flex: 1; min-width: 200px;" />
        
        <p-select [options]="triggerOptions" [(ngModel)]="newRuleTrigger" 
                    placeholder="Selecione o Gatilho" styleClass="w-full" [style]="{'min-width': '220px'}">
        </p-select>
        
        <p-select [options]="actionOptions" [(ngModel)]="newRuleAction" 
                    placeholder="Selecione a Ação" styleClass="w-full" [style]="{'min-width': '250px'}">
        </p-select>
        
        <p-button label="Criar Workflow" icon="pi pi-plus" (onClick)="createRule()" styleClass="w-full"></p-button>
      </div>
    </div>
  </div>
</div>
