<div class="ag-admin-shell">

  <!-- Update Notifier Toast (background check) -->
  <app-update-notifier></app-update-notifier>

  <!-- Sidebar -->

  <aside class="ag-sidebar">
    <div class="sidebar-logo">
      <span class="logo-mark">▲</span>
      <span class="logo-text">AgendaAi</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <i class="pi pi-home"></i><span>Painel</span>
      </a>
      <a routerLink="/admin/agenda" routerLinkActive="active">
        <i class="pi pi-calendar-times"></i><span>Agenda</span>
      </a>
      <a routerLink="/admin/clientes" routerLinkActive="active">
        <i class="pi pi-users"></i><span>Clientes</span>
      </a>
      <a routerLink="/admin/profissionais" routerLinkActive="active" *ngIf="isDono | async">
        <i class="pi pi-id-card"></i><span>Profissionais</span>
      </a>
      <a routerLink="/admin/analytics" routerLinkActive="active" *ngIf="isAdminOrFin | async">
        <i class="pi pi-chart-bar"></i><span>Analytics IA</span>
      </a>
      <a routerLink="/admin/configuracoes" routerLinkActive="active">
        <i class="pi pi-cog"></i><span>Configurações</span>
      </a>
      <a routerLink="/admin/billing" routerLinkActive="active" *ngIf="isDono | async">
        <i class="pi pi-credit-card"></i><span>Planos</span>
        <span class="trial-badge" *ngIf="billing.isTrialActive() | async as active">
           {{ billing.getTrialDaysRemaining() | async }}d restantes
        </span>
      </a>
    </nav>

    <!-- Cost Tracker at bottom of sidebar -->
    <div class="sidebar-footer" *ngIf="costTracker.quota$ | async as quota">
      <div class="cost-row">
        <i class="pi pi-comments"></i>
        <div class="cost-bar-wrap">
          <div class="cost-label">SMS Enviados</div>
          <div class="cost-track green">
            <div class="cost-fill green" [style.width]="((quota.smsUsed / 100) * 100) + '%'"></div>
          </div>
          <div class="cost-nums">{{ quota.smsUsed }} / 100</div>
        </div>
      </div>
    </div>

    <!-- ELITE PRIVACY SHIELD Status -->
    <div class="privacy-shield-wrap" pTooltip="Sua conexão está protegida por um túnel RPC criptografado ponta-a-ponta. Zero Query Params expostos." tooltipPosition="right">
      <div class="shield-status-icon"></div>
      <div class="shield-info">
        <span class="shield-title">Rede Blindada</span>
        <span class="shield-desc">Status: Ativo (RPC)</span>
      </div>
      <i class="pi pi-verified" style="color: #10b981; font-size: 0.9rem;"></i>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="ag-main">
    <!-- Topbar -->
    <header class="ag-topbar">
      <div class="topbar-search">
        <i class="pi pi-search"></i>
        <span>Pressione <kbd>Ctrl+K</kbd> para buscar</span>
      </div>
      <div class="topbar-right">
        <!-- Theme Switcher -->
        <div class="theme-selector-wrap">
          <div class="theme-indicator" 
            [class.pos-claro]="theme.currentTheme === 'claro'"
            [class.pos-escuro]="theme.currentTheme === 'escuro'"
            [class.pos-translucido]="theme.currentTheme === 'translucido'">
          </div>
          <button (click)="setTheme('claro')" [class.active]="theme.currentTheme === 'claro'" 
            pTooltip="Modo Claro" tooltipPosition="bottom">
            <i class="pi pi-sun"></i>
          </button>
          <button (click)="setTheme('escuro')" [class.active]="theme.currentTheme === 'escuro'" 
            pTooltip="Modo Escuro" tooltipPosition="bottom">
            <i class="pi pi-moon"></i>
          </button>
          <button (click)="setTheme('translucido')" [class.active]="theme.currentTheme === 'translucido'" 
            pTooltip="Elite Glass" tooltipPosition="bottom">
            <i class="pi pi-image"></i>
          </button>
        </div>

        <div class="notif-wrapper">
          <p-button icon="pi pi-bell" [rounded]="true" [text]="true" severity="secondary" 
            (click)="isNotifOpen = !isNotifOpen"></p-button>
          <span class="notif-badge" *ngIf="notifService.unreadCount > 0">{{ notifService.unreadCount }}</span>
        </div>
        <div class="user-avatar-wrap" (click)="menu.toggle($event)" *ngIf="userProfile$ | async as profile">
          <p-avatar [label]="(profile.nome[0] | uppercase)" shape="circle" styleClass="premium-avatar"></p-avatar>
        </div>
        <p-menu #menu [model]="userMenuItems" [popup]="true" styleClass="premium-menu"></p-menu>
      </div>
    </header>

    <!-- Notification Center Overlay -->
    <app-notification-center [isOpen]="isNotifOpen" (close)="isNotifOpen = false"></app-notification-center>

    <!-- Child Page Content -->
    <div class="ag-page-content">
      <router-outlet></router-outlet>
    </div>
  </div>

  <app-command-palette></app-command-palette>

  <!-- Onboarding Modal — shown only once per user -->
  <app-onboarding-modal *ngIf="showOnboarding"></app-onboarding-modal>

  <!-- Popup Toasts -->
  <app-toast-container></app-toast-container>

</div>
